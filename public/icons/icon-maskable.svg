<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Mon super store">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2d3d"/>
      <stop offset="1" stop-color="#a9824a"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background so the maskable safe-zone crop never shows edges. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Logo kept inside the central 80% safe zone (~51px margin). -->
  <circle cx="256" cy="230" r="112" fill="rgba(250,247,242,0.08)"/>
  <text x="256" y="244" font-family="Georgia, 'Times New Roman', serif" font-size="176" font-style="italic" fill="#faf7f2" text-anchor="middle" dominant-baseline="central">S</text>
  <text x="256" y="388" font-family="Helvetica, Arial, sans-serif" font-size="38" letter-spacing="3" fill="#c9a36a" text-anchor="middle">STORE</text>
</svg>
